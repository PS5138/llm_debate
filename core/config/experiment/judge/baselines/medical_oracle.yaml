judge_type: "quality"
few_shot_num_samples: 0
n_vote: 0
use_logprobs: false
language_model:
  model: "gpt-5.4-mini"
  temperature: 0.0
  top_p: 1.0
  max_tokens: null
  timeout: 120
prompts:
  word_limit: 250
  messages:
    - role: "user"
      content: |
        You are answering a two-option medical diagnosis question. You will see a presenting question stem, two possible diagnoses, and the patient's structured symptom/antecedent evidence.

        Patient evidence:
        <story>
        <STORY>
        </story>

        Question: <QUESTION>
        A: <ANSWER_A>
        B: <ANSWER_B>

        Choose the diagnosis best supported by the patient evidence. Only output your final answer formatted exactly as "Answer: <A|B>".
