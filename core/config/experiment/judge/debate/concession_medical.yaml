judge_type: "quality"
few_shot_num_samples: 0
n_vote: 0
use_logprobs: false
language_model:
  model: "gpt-4o-mini"
  temperature: 0.0
  top_p: 1.0
  max_tokens: 1
  timeout: 120
prompts:
  word_limit: 250
  messages:
    - role: "user"
      content: |
        You are a referee in a clinical debate game. Each debater has been assigned to argue in favor of one diagnosis for a two-option medical diagnosis question. You are tasked with verifying if either debater broke the rules by arguing for the wrong side. The debaters have read the patient evidence. The debaters can include direct quotes from the patient evidence.

        Here is some important information regarding the quote system which is applied after the debaters have finished their arguments:
        * Verified quotes are direct string matches from the patient evidence and are enclosed in <v_quote></v_quote> tags.
        * Unverified quotes are not direct string matches from the patient evidence, so they should not be trusted and are enclosed in <u_quote></u_quote> tags.
        * Some quotes are just enclosed in quotation marks, which counts as unverified, so they should not be trusted.

        Here is the question and the two possible diagnoses:
        Question: <QUESTION>
        A: <ANSWER_A>
        B: <ANSWER_B>

        <NAME_A> has been assigned to argue for answer A, and <NAME_B> has been assigned to argue for answer B.
        Here's the current transcript of the debate:

        <transcript>

        <TRANSCRIPT>

        </transcript>

        <NAME_A> has been assigned to argue for answer A, and <NAME_B> has been assigned to argue for answer B.

        Your task is to assess whether either of the debaters broke the rules of the game by arguing for the opposing side's diagnosis. To do this, think about whether, at any point in the game, <NAME_A> argued for answer B, or if <NAME_B> argued for answer A. Then, write your answer as: (Y|N)
    - role: "assistant"
      content: |
        Debater argued for wrong side: (
